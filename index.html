<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Sylvester | Official Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">DJ SYLVESTER</div>
            <ul class="nav-links">
                <li><a href="#music">Music</a></li>
                <li><a href="#events">Events</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>DJ SYLVESTER</h1>
                <p class="tagline">Premium Sounds. Unforgettable Vibes.</p>
                <div class="cta-buttons">
                    <a href="#music" class="btn primary">Listen Now</a>
                    <a href="#contact" class="btn secondary">Book DJ</a>
                </div>
            </div>
        </section>

        <section id="music" class="section">
            <h2>Latest Mixes</h2>
            <div class="music-grid">
                <!-- Mixes will be dynamically added or manually inserted here -->
                <div class="mix-card">
                    <div class="mix-placeholder"></div>
                    <h3>Amapiano Vibes Vol. 1</h3>
                </div>
                <div class="mix-card">
                    <div class="mix-placeholder"></div>
                    <h3>Jersey Club Essentials</h3>
                </div>
            </div>
        </section>

        <section id="contact" class="section">
            <h2>Get In Touch</h2>
            <p>For bookings and inquiries: <a href="mailto:bookings@djsylvester.com">bookings@djsylvester.com</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 DJ Sylvester. All rights reserved.</p>
    </footer>
</body>
</html>
